name: AnyArch-AppImage
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true
on:
  schedule:
    - cron: "0 7 1/21 * *"
  workflow_dispatch: {}

jobs:
  build:
    name: "${{ matrix.arch }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - arm32v7
          - ppc64
          - ppc64le
          - pentium4
        include:
          - arch: x86_64
            platform: linux/amd64
            image: ghcr.io/pkgforge-dev/archlinux:latest
          - arch: aarch64
            platform: linux/arm64
            image: danhunsaker/archlinuxarm:latest
          - arch: arm32v7
            platform: linux/arm/v7
            image: danhunsaker/archlinuxarm:latest
          - arch: ppc64
            platform: linux/ppc64
            image: kth5/archpower:latest-ppc64
            entrypoint: /bin/sh
          - arch: ppc64le
            platform: linux/ppc64le
            image: kth5/archpower:latest-ppc64le
          - arch: pentium4
            image: jonathonf/archlinux32:pentium4
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install QEMU for ppc64 (big-endian)
        if: matrix.arch == 'ppc64'
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            ${{ matrix.platform && format('--platform {0}', matrix.platform) || '' }} \
            ${{ matrix.entrypoint && format('--entrypoint {0}', matrix.entrypoint) || '' }} \
            ${{ matrix.image }} \
            ${{ matrix.entrypoint && '-c' || 'sh -c' }} "
              pacman-key --init 2>/dev/null || true
              pacman -Sy --noconfirm 2>/dev/null || true
              pacman -S --noconfirm archlinux-keyring 2>/dev/null || true
              pacman -Su --noconfirm 2>/dev/null || true
              # Disable pacman sandbox (Landlock unavailable under QEMU)
              if ! grep -q '^DisableSandbox' /etc/pacman.conf 2>/dev/null; then
                echo 'DisableSandbox' >> /etc/pacman.conf
              fi
              sed -i 's/^DownloadUser/#DownloadUser/' /etc/pacman.conf 2>/dev/null || true
              # Force fresh pentium4 mirror for old images
              case "\$(uname -m)" in i686|pentium4)
                echo 'Server = https://mirror.math.princeton.edu/pub/archlinux32/pentium4/\$repo' > /etc/pacman.d/mirrorlist
                sed -i 's/^CFLAGS=.*/CFLAGS=\"-march=pentium4 -mtune=pentium4 -O2 -pipe -fstack-protector-strong -fno-plt\"/' /etc/makepkg.conf 2>/dev/null || true
                sed -i 's/^CXXFLAGS=.*/CXXFLAGS=\"-march=pentium4 -mtune=pentium4 -O2 -pipe -fstack-protector-strong -fno-plt\"/' /etc/makepkg.conf 2>/dev/null || true
              esac
              pkgs='base-devel git jq patchelf wget zsync unzip 7zip \
                freetype2 libx11 libxrandr libxss nspr nss nss-mdns \
                pulseaudio pulseaudio-alsa xorg-server-xvfb'
              if ! pacman -S --noconfirm \$pkgs 2>/dev/null; then
                echo 'Normal install failed under QEMU, trying download+extract...'
                pacman -Sw --noconfirm \$pkgs 2>/dev/null || true
                for pkg in /var/cache/pacman/pkg/*.pkg.tar.*; do
                  [ -f \"\$pkg\" ] && tar --zstd -xf \"\$pkg\" -C / 2>/dev/null || tar -xf \"\$pkg\" -C / 2>/dev/null || true
                done
              fi
              # Try wget first, fall back to curl, then busybox wget
              if command -v wget >/dev/null 2>&1; then
                wget -q 'https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/main/useful-tools/quick-sharun.sh' \
                  -O /usr/local/bin/quick-sharun || true
              elif command -v curl >/dev/null 2>&1; then
                curl -sLo /usr/local/bin/quick-sharun \
                  'https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/main/useful-tools/quick-sharun.sh' || true
              fi
              chmod +x /usr/local/bin/quick-sharun 2>/dev/null || true
              echo Architecture: \$(uname -m)
              /bin/sh ./get-dependencies.sh
              /bin/sh ./make-appimage.sh
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppImage-${{ matrix.arch }}
          path: dist
          if-no-files-found: warn

  release:
    if: ${{ github.ref_name == 'main' }}
    needs: [build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
          pattern: AppImage-*
          merge-multiple: true

      - name: Collect files
        run: find /tmp/artifacts -type f -exec cp -v {} . \;

      - name: Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: '*'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (manual/schedule)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: '*'
          tag_name: ${{ github.sha }}
          name: Build ${{ github.sha }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
